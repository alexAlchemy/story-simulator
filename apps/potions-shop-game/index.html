<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aphebis Potions Shop Prototype</title>
  </head>
  <body>
    <div id="app" x-data="potionsShop()" x-init="init()">
      <header class="shop-header">
        <div>
          <div class="shop-nameplate">
          <h1>Briarwick Apothecary</h1>
                  <div class="day-card">
          <div class="day-chip-line">
            <span>Day</span>
            <strong x-text="state.day"></strong>
          </div>
          <small x-text="rentText"></small>
        </div>
          </div>
          <nav class="tabs" aria-label="Primary views">
            <button
              type="button"
              :class="{ active: activeTab === 'dashboard' }"
              :aria-selected="activeTab === 'dashboard'"
              @click="selectTab('dashboard')"
            >
              Dashboard
            </button>
            <button
              type="button"
              :class="{ active: activeTab === 'state' }"
              :aria-selected="activeTab === 'state'"
              @click="selectTab('state')"
            >
              State
            </button>
            <button
              type="button"
              :class="{ active: activeTab === 'scenes' }"
              :aria-selected="activeTab === 'scenes'"
              @click="selectTab('scenes')"
            >
              Scenes
            </button>
            <button
              type="button"
              :class="{ active: activeTab === 'history' }"
              :aria-selected="activeTab === 'history'"
              @click="selectTab('history')"
            >
              History
            </button>
          </nav>
        </div>

      </header>

      <section
        x-data="dashboardPanel()"
        x-show="activeTab === 'dashboard'"
        x-cloak
        class="tab-window"
        aria-label="Dashboard"
      >
        <main class="layout">
          <section class="state-column" aria-label="Shop state">
            <div class="panel">
              <h2>Shop</h2>
              <template x-for="item in resourceRows" :key="item.key">
                <div class="stat-row">
                  <span x-text="item.label"></span>
                  <strong x-text="item.value"></strong>
                </div>
              </template>
            </div>

            <div class="panel">
              <h2>Values</h2>
              <template x-for="item in valueRows" :key="item.key">
                <div class="stat-row">
                  <span x-text="item.label"></span>
                  <strong x-text="item.value"></strong>
                </div>
              </template>
            </div>

            <div class="panel">
              <h2>Standing</h2>
              <template x-for="item in standingRows" :key="item.key">
                <div class="stat-row">
                  <span x-text="item.label"></span>
                  <strong x-text="item.value"></strong>
                </div>
              </template>
            </div>

            <div class="panel actions">
              <button type="button" class="primary" @click="advance()" :disabled="state.ended">
                Advance day
              </button>
              <button type="button" @click="restart()">Restart run</button>
            </div>
          </section>

          <section class="tableau-column" aria-label="Scene tableau">
            <div class="section-heading">
              <h2>Scene Tableau</h2>
              <span x-text="tableauStatus"></span>
            </div>
            <div class="scene-list">
              <template x-if="showEmptyTableau">
                <div class="empty-tableau">
                  <span class="scene-type">day complete</span>
                  <strong>No scenes available</strong>
                  <p>The shop has given you all it can for today.</p>
                  <button type="button" class="primary" @click="advance()">Advance day</button>
                </div>
              </template>
              <template x-for="scene in visibleScenes" :key="scene.id">
                <button
                  type="button"
                  class="scene"
                  :class="{ selected: selectedSceneId === scene.id }"
                  @click="selectScene(scene.id)"
                >
                  <span class="scene-type" x-text="scene.type"></span>
                  <strong x-text="scene.title"></strong>
                  <small x-text="scene.description"></small>
                </button>
              </template>
            </div>
          </section>

          <section class="detail-column" aria-label="Selected scene">
            <template x-if="!state.ended && selectedScene">
              <article class="scene-detail">
                <div class="scene-detail-head">
                  <span class="scene-type" x-text="selectedScene.type"></span>
                  <h2 x-text="selectedScene.title"></h2>
                </div>
                <h3 x-show="selectedBeat?.title" x-text="selectedBeat?.title"></h3>
                <p x-text="selectedSceneText"></p>

                <div class="choices">
                  <template x-for="choice in selectedSceneChoices" :key="choice.id">
                    <button type="button" @click="choose(choice.id)">
                      <strong x-text="choice.label"></strong>
                      <span x-show="choice.description" x-text="choice.description"></span>
                    </button>
                  </template>
                </div>
              </article>
            </template>

            <template x-if="!state.ended && !selectedScene">
              <article class="scene-detail empty">
                <h2>Choose a scene</h2>
                <p>The counter is open, the rain is steady, and somebody needs something from you.</p>
              </article>
            </template>

            <template x-if="state.ended && ending">
              <article class="scene-detail ending">
                <span class="scene-type">ending</span>
                <h2 x-text="ending.title"></h2>
                <p x-text="ending.shopOutcome"></p>
                <p x-text="ending.identityOutcome"></p>
                <p x-text="ending.socialOutcome"></p>
                <p class="hook" x-text="ending.futureHook"></p>
              </article>
            </template>
          </section>
        </main>

      </section>

      <section
        x-data="dashboardPanel()"
        x-show="activeTab === 'scenes'"
        x-cloak
        class="tab-window scenes-window"
        aria-label="Scenes"
      >
        <template x-if="!state.ended && sceneBrowserView === 'list'">
          <section class="scene-browser" aria-label="Available scenes">
            <div class="section-heading">
              <h2>Scenes</h2>
              <span x-text="tableauStatus"></span>
            </div>

            <div class="scene-route-list">
              <template x-if="showEmptyTableau">
                <div class="empty-tableau">
                  <span class="scene-type">day complete</span>
                  <strong>No scenes available</strong>
                  <p>The shop has given you all it can for today.</p>
                  <button type="button" class="primary" @click="advance()">Advance day</button>
                </div>
              </template>

              <template x-for="scene in visibleScenes" :key="scene.id">
                <button
                  type="button"
                  class="scene-route-card"
                  @click="openScene(scene.id)"
                  :aria-label="'Open ' + scene.title"
                >
                  <span>
                    <span class="scene-type" x-text="scene.type"></span>
                    <strong x-text="scene.title"></strong>
                    <small x-text="scene.description"></small>
                  </span>
                  <span class="scene-chevron" aria-hidden="true">&gt;</span>
                </button>
              </template>
            </div>
          </section>
        </template>

        <template x-if="!state.ended && sceneBrowserView === 'detail' && selectedScene">
          <article class="scene-detail scene-route-detail">
            <button type="button" class="back-button" @click="backToSceneList()">
              <span aria-hidden="true">&lt;</span>
              <span>Scenes</span>
            </button>

            <div class="scene-detail-head">
              <span class="scene-type" x-text="selectedScene.type"></span>
              <h2 x-text="selectedScene.title"></h2>
            </div>
            <h3 x-show="selectedBeat?.title" x-text="selectedBeat?.title"></h3>
            <p x-text="selectedSceneText"></p>

            <div class="choices">
              <template x-for="choice in selectedSceneChoices" :key="choice.id">
                <button type="button" @click="choose(choice.id)">
                  <strong x-text="choice.label"></strong>
                  <span x-show="choice.description" x-text="choice.description"></span>
                </button>
              </template>
            </div>
          </article>
        </template>

        <template x-if="state.ended && ending">
          <article class="scene-detail ending">
            <span class="scene-type">ending</span>
            <h2 x-text="ending.title"></h2>
            <p x-text="ending.shopOutcome"></p>
            <p x-text="ending.identityOutcome"></p>
            <p x-text="ending.socialOutcome"></p>
            <p class="hook" x-text="ending.futureHook"></p>
          </article>
        </template>
      </section>

      <section
        x-data="dashboardPanel()"
        x-show="activeTab === 'history'"
        x-cloak
        class="tab-window history-window"
        aria-label="History"
      >
        <aside class="history-panel" aria-label="Recent consequences and debug state">
          <div class="panel">
            <div class="section-heading">
              <h2>Recent Consequences</h2>
              <span x-text="recentLog.length + ' entries'"></span>
            </div>
            <template x-if="recentLog.length">
              <div class="history-list">
                <template x-for="entry in recentLog" :key="entry.id">
                  <p><span x-text="'Day ' + entry.day"></span> · <span x-text="entry.text"></span></p>
                </template>
              </div>
            </template>
            <template x-if="!recentLog.length">
              <p class="history-empty">No consequences have been logged yet.</p>
            </template>
          </div>

          <div class="panel">
            <details>
              <summary>Debug state</summary>
              <pre x-text="debugState"></pre>
            </details>
          </div>
        </aside>
      </section>

      <section
        x-data="worldStatePanel()"
        x-show="activeTab === 'state'"
        x-cloak
        class="tab-window world-state"
        aria-label="World state"
      >
        <div class="section-heading">
          <h2>World State</h2>
          <span x-text="entityCards.length + ' entities'"></span>
        </div>

        <div class="state-grid">
          <section aria-label="Entities">
            <h2>Entities</h2>
            <div class="state-card-list">
              <template x-for="entity in entityCards" :key="entity.id">
                <article class="state-card" x-data="entityCard(entity.id)">
                  <div class="state-card-head">
                    <div>
                      <span class="scene-type" x-text="currentEntity(entityCards).kind"></span>
                      <h3 x-text="currentEntity(entityCards).displayName"></h3>
                    </div>
                    <small x-text="currentEntity(entityCards).id"></small>
                  </div>

                  <div class="tag-list" x-show="currentEntity(entityCards).tags.length">
                    <template x-for="tag in currentEntity(entityCards).tags" :key="tag">
                      <span x-text="tag"></span>
                    </template>
                  </div>

                  <div class="state-section" x-show="currentEntity(entityCards).resources.length">
                    <h4>Resources</h4>
                    <template x-for="item in currentEntity(entityCards).resources" :key="item.key">
                      <div class="stat-row compact">
                        <span x-text="item.label"></span>
                        <span class="stat-value">
                          <strong x-text="item.value"></strong>
                          <small x-show="item.semantic" x-text="item.semantic ? item.semantic.label + ': ' + item.semantic.description : ''"></small>
                        </span>
                      </div>
                    </template>
                  </div>

                  <div class="state-section" x-show="currentEntity(entityCards).scales.length">
                    <h4>Scales</h4>
                    <template x-for="item in currentEntity(entityCards).scales" :key="item.key">
                      <div class="stat-row compact">
                        <span x-text="item.label"></span>
                        <span class="stat-value">
                          <strong x-text="item.value"></strong>
                          <small x-show="item.semantic" x-text="item.semantic ? item.semantic.label + ': ' + item.semantic.description : ''"></small>
                        </span>
                      </div>
                    </template>
                  </div>

                  <div class="state-section" x-show="currentEntity(entityCards).spectra.length">
                    <h4>Spectra</h4>
                    <template x-for="item in currentEntity(entityCards).spectra" :key="item.key">
                      <div class="stat-row compact">
                        <span x-text="item.label"></span>
                        <span class="stat-value">
                          <strong x-text="item.value"></strong>
                          <small x-show="item.semantic" x-text="item.semantic ? item.semantic.label + ': ' + item.semantic.description : ''"></small>
                        </span>
                      </div>
                    </template>
                  </div>

                  <div class="state-section" x-show="currentEntity(entityCards).facts.length">
                    <h4>Facts</h4>
                    <template x-for="item in currentEntity(entityCards).facts" :key="item.key">
                      <div class="stat-row compact">
                        <span x-text="item.label"></span>
                        <span class="stat-value">
                          <strong x-text="item.value"></strong>
                          <small x-show="item.semantic" x-text="item.semantic ? item.semantic.label + ': ' + item.semantic.description : ''"></small>
                        </span>
                      </div>
                    </template>
                  </div>
                </article>
              </template>
            </div>
          </section>
        </div>
      </section>
    </div>
    <script type="module" src="/src/ui/app.ts"></script>
  </body>
</html>
